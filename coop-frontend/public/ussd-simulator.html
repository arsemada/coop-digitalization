<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USSD Simulator - *123#</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #004B33 0%, #0A7A54 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e8e8;
      padding: 1rem;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 400px;
    }
    .header {
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #E8E0D5;
      margin: 0 0 0.5rem 0;
    }
    .ussd-code {
      font-size: 2rem;
      font-weight: 700;
      color: #D4AF37;
      margin: 0;
    }
    .back-btn {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      background: rgba(232, 224, 213, 0.1);
      color: #E8E0D5;
      text-decoration: none;
      border-radius: 0.5rem;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid rgba(232, 224, 213, 0.2);
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: rgba(232, 224, 213, 0.2);
      border-color: rgba(232, 224, 213, 0.3);
    }
    .phone {
      width: 100%;
      max-width: 360px;
      background: #0f0f1a;
      border-radius: 2.5rem;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      border: 2px solid #2d2d44;
    }
    .screen {
      background: #0d0d14;
      border-radius: 1rem;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #2d2d44;
    }
    .display {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cbd5e0;
    }
    .display .line {
      margin-bottom: 0.5rem;
    }
    .display .sys {
      color: #718096;
      font-size: 11px;
    }
    .input-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      border-top: 1px solid #2d2d44;
      background: #0f0f1a;
    }
    .input-row input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid #2d2d44;
      background: #1a1a2e;
      color: #e8e8e8;
      font-size: 14px;
    }
    .input-row input[type="text"]::placeholder {
      color: #4a5568;
    }
    .input-row input[type="text"]:focus {
      outline: none;
      border-color: #0A7A54;
      box-shadow: 0 0 0 2px rgba(10, 122, 84, 0.2);
    }
    .input-row button {
      padding: 0.6rem 1rem;
      border-radius: 0.5rem;
      border: none;
      background: #0A7A54;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-row button:hover {
      background: #004B33;
    }
    .input-row button:disabled {
      background: #4a5568;
      cursor: not-allowed;
    }
    .config {
      width: 100%;
      max-width: 360px;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 0.75rem;
      font-size: 12px;
      border: 1px solid rgba(232, 224, 213, 0.1);
    }
    .config label {
      display: block;
      color: #E8E0D5;
      margin-bottom: 0.25rem;
      font-weight: 500;
    }
    .config input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(232, 224, 213, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: #E8E0D5;
      font-size: 13px;
      margin-bottom: 0.75rem;
    }
    .config input:focus {
      outline: none;
      border-color: #0A7A54;
      box-shadow: 0 0 0 2px rgba(10, 122, 84, 0.2);
    }
    .config .note {
      color: #a0aec0;
      font-size: 11px;
      margin-top: -0.5rem;
      margin-bottom: 0.75rem;
    }
    .error {
      color: #fc8181;
      font-size: 12px;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <p class="ussd-code">*123#</p>
      <h1>USSD Simulator</h1>
      <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
    </div>
    <div class="config">
      <label>Account Phone Number</label>
      <input type="text" id="phoneNumber" value="" placeholder="e.g. 0918781174 or +251918781174" />
      <p class="note">Enter your registered member phone number</p>
      
      <label>API Base URL</label>
      <input type="text" id="apiBase" value="http://localhost:8080" placeholder="http://localhost:8080" />
      <p class="note">PIN: Set in Dashboard → Members → "Set USSD PIN" (4 digits)</p>
    </div>
    <div class="phone">
      <div class="screen">
        <div class="display" id="display"></div>
        <div class="input-row">
          <input type="text" id="input" placeholder="Enter your choice..." autocomplete="off" />
          <button type="button" id="send">Send</button>
        </div>
      </div>
    </div>
    <div id="error" class="error"></div>
  </div>
  <script>
    (function () {
      const API_BASE_KEY = 'ussd_sim_api_base';
      const PHONE_KEY = 'ussd_sim_phone';
      const display = document.getElementById('display');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('send');
      const apiBaseInput = document.getElementById('apiBase');
      const phoneInput = document.getElementById('phoneNumber');
      const errorEl = document.getElementById('error');

      let sessionId = 'sim-' + Date.now();
      let currentText = '';

      // Load saved values
      try {
        const savedApi = localStorage.getItem(API_BASE_KEY);
        const savedPhone = localStorage.getItem(PHONE_KEY);
        if (savedApi) apiBaseInput.value = savedApi;
        if (savedPhone) phoneInput.value = savedPhone;
      } catch (_) {}

      // Save on change
      apiBaseInput.addEventListener('change', function () {
        try { localStorage.setItem(API_BASE_KEY, apiBaseInput.value); } catch (_) {}
      });
      phoneInput.addEventListener('change', function () {
        try { localStorage.setItem(PHONE_KEY, phoneInput.value); } catch (_) {}
      });

      function appendSys(msg) {
        const line = document.createElement('div');
        line.className = 'line sys';
        line.textContent = msg;
        display.appendChild(line);
        display.scrollTop = display.scrollHeight;
      }

      function appendReply(raw) {
        const line = document.createElement('div');
        line.className = 'line';
        const isEnd = raw.startsWith('END ');
        const isCon = raw.startsWith('CON ');
        const text = (isEnd ? raw.slice(4) : isCon ? raw.slice(4) : raw).trim();
        line.textContent = text;
        display.appendChild(line);
        display.scrollTop = display.scrollHeight;
        if (isEnd) {
          currentText = ''; // Reset the text path
          sessionId = 'sim-' + Date.now(); // Generate new session ID
          appendSys('─────────────────────────');
          appendSys('Session ended. Dial *123# to start again.');
        }
      }

      function setError(msg) {
        errorEl.textContent = msg || '';
      }

      function doRequest() {
        const apiBase = (apiBaseInput.value || '').trim().replace(/\/$/, '');
        const phone = (phoneInput.value || '').trim();
        if (!apiBase) {
          setError('Please set API base URL');
          return;
        }
        if (!phone) {
          setError('Please enter your phone number');
          return;
        }
        const value = (input.value || '').trim();
        
        // If starting fresh (empty currentText), generate new session
        if (currentText === '' && value === '') {
          sessionId = 'sim-' + Date.now() + '-' + Math.random().toString(36).substring(7);
        }
        
        const newText = value ? (currentText ? currentText + '*' + value : value) : currentText;
        const url = apiBase + '/api/ussd';
        const body = { sessionId, phoneNumber: phone, text: newText || '' };

        setError('');
        sendBtn.disabled = true;
        if (newText === '') {
          appendSys('Dialing *123#...');
        } else {
          appendSys('→ ' + value);
        }
        
        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.text();
          })
          .then(function (text) {
            appendReply(text);
            currentText = newText;
            input.value = '';
            input.focus();
          })
          .catch(function (err) {
            setError(err.message || 'Request failed');
            appendSys('✗ Error: ' + (err.message || 'Request failed'));
          })
          .finally(function () {
            sendBtn.disabled = false;
          });
      }

      sendBtn.addEventListener('click', doRequest);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          doRequest();
        }
      });

      // Initial welcome message
      appendSys('═══════════════════════════');
      appendSys('Welcome to USSD Simulator');
      appendSys('═══════════════════════════');
      appendSys('HOW TO USE:');
      appendSys('1. Enter your phone number above');
      appendSys('2. Leave input field EMPTY and click Send');
      appendSys('   This will dial *123# and show language menu');
      appendSys('3. Type a NUMBER (1, 2, 3, or 4) to select language:');
      appendSys('   1 = English');
      appendSys('   2 = Amharic');
      appendSys('   3 = Oromiffa');
      appendSys('   4 = Tigrigna');
      appendSys('4. Enter your 4-digit PIN');
      appendSys('5. Select services from the menu');
      appendSys('');
      appendSys('IMPORTANT: Always enter NUMBERS, not words!');
    })();
  </script>
</body>
</html>
